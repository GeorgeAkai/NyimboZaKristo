# Render Blueprint — Nyimbo Za Kristo web app (Vite PWA static site)
# Apply: https://dashboard.render.com/blueprint/new?repo=https://github.com/GeorgeAkai/NyimboZaKristo

services:
  - type: web
    name: nyimbozakristo
    runtime: static
    branch: main
    autoDeploy: true
    # Vite/TS live in devDependencies — never set NODE_ENV=production on this service.
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: ./dist

    buildFilter:
      paths:
        - src/**
        - src/data/igbo-hymns.json
        - public/**
        - scripts/lib/**
        - index.html
        - package.json
        - package-lock.json
        - vite.config.ts
        - tsconfig*.json
        - tailwind.config.js
        - postcss.config.js
        - eslint.config.js
        - render.yaml

    envVars:
      - key: NODE_VERSION
        value: "20.19.0"

    # Client-side app uses history API on a single URL; rewrite supports refresh & PWA entry.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

      - path: /sw.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

      - path: /manifest.webmanifest
        name: Cache-Control
        value: public, max-age=86400

      - path: /*
        name: X-Frame-Options
        value: DENY

      - path: /*
        name: X-Content-Type-Options
        value: nosniff

      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
